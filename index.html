<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Báo Giá Phụ Tùng</title>
    <!-- Tailwind & Flowbite -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .data-table-container { background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; overflow: hidden; }
        .tag-genuine { background-color: #def7ec; color: #03543f; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
        .tag-aftermarket { background-color: #fef3c7; color: #92400e; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar -->
    <nav class="bg-white border-b border-gray-200 px-4 py-2.5 fixed left-0 right-0 top-0 z-50">
        <div class="flex flex-wrap justify-between items-center mx-auto max-w-screen-xl">
            <a href="#" class="flex items-center gap-3">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <span class="self-center text-xl font-extrabold whitespace-nowrap text-gray-900 tracking-tight">TASCO <span class="text-blue-600">DLK</span></span>
            </a>
            <div class="flex items-center lg:order-2">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mr-4">Phân hệ tra cứu giá</span>
                <div class="h-8 w-px bg-gray-200 mr-4"></div>
                <button type="button" class="text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-4 focus:ring-gray-200 rounded-lg text-sm p-2.5">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-16 px-4 mx-auto max-w-screen-xl">
        
        <!-- Header Title -->
        <div class="mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Tra cứu lịch sử báo giá</h2>
            <p class="text-gray-500 font-medium">Hệ thống hỗ trợ giám định viên truy vấn nhanh đơn giá phụ tùng đã duyệt.</p>
        </div>

        <!-- Filter Card -->
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                <div>
                    <label for="filterHang" class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wider">1. Hãng xe</label>
                    <select id="filterHang" onchange="updateHieuXeDropdown()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 font-semibold">
                        <option value="">-- Chọn hãng --</option>
                    </select>
                </div>
                <div>
                    <label for="filterHieu" class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wider">2. Hiệu xe</label>
                    <select id="filterHieu" onchange="updateNamSXDropdown()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 font-semibold">
                        <option value="">-- Chọn hiệu xe --</option>
                    </select>
                </div>
                <div>
                    <label for="filterNam" class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wider">3. Năm sản xuất</label>
                    <select id="filterNam" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 font-semibold">
                        <option value="">-- Tất cả các năm --</option>
                    </select>
                </div>
                <div>
                    <label for="searchInput" class="block mb-2 text-xs font-bold text-gray-500 uppercase tracking-wider">4. Tên phụ tùng</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" placeholder="Tìm đèn, gương, cản..." class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full pl-10 p-2.5 font-semibold" onkeydown="if(event.key==='Enter') searchData()">
                    </div>
                </div>
            </div>
            <div class="flex justify-end">
                <button onclick="searchData()" class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-bold rounded-lg text-sm px-10 py-3 text-center inline-flex items-center gap-2 transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    Tìm kiếm dữ liệu
                </button>
            </div>
        </div>

        <!-- Status & Results -->
        <div class="flex items-center justify-between mb-4">
            <h3 id="statusArea" class="text-sm font-bold text-gray-500 uppercase tracking-wider">Sẵn sàng tra cứu</h3>
            <div id="loadingIndicator" class="hidden">
                <div class="flex items-center gap-2 text-blue-600 font-bold text-xs">
                    <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    ĐANG TẢI DỮ LIỆU...
                </div>
            </div>
        </div>

        <div class="data-table-container shadow-sm">
            <table class="w-full text-sm text-left text-gray-500">
                <thead class="text-xs text-gray-700 uppercase bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th scope="col" class="px-6 py-4">Thông tin phụ tùng</th>
                        <th scope="col" class="px-6 py-4">Phân loại</th>
                        <th scope="col" class="px-6 py-4">Xe áp dụng</th>
                        <th scope="col" class="px-6 py-4">Garage / Địa phương</th>
                        <th scope="col" class="px-6 py-4 text-right">Đơn giá duyệt</th>
                        <th scope="col" class="px-6 py-4 text-center">Hành động</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <tr class="bg-white border-b border-gray-100">
                        <td colspan="6" class="px-6 py-20 text-center">
                            <div class="flex flex-col items-center gap-3 text-gray-400">
                                <svg class="w-12 h-12 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                <p class="font-bold">Nhập thông tin để bắt đầu tra cứu</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; 
        let NAM_ALL = []; 

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => {
                        selectHang.add(new Option(hang, hang));
                    });
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selectHieu = document.getElementById('filterHieu');
            selectHieu.innerHTML = '<option value="">-- Chọn hiệu xe --</option>';
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => selectHieu.add(new Option(hieu, hieu)));
            }
            fillNamSXDropdown(NAM_ALL);
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const hieu = document.getElementById('filterHieu').value;
            if (hang && hieu && CAY_GIA_PHA[hang][hieu]) {
                fillNamSXDropdown(CAY_GIA_PHA[hang][hieu]);
            } else {
                fillNamSXDropdown(NAM_ALL);
            }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">-- Tất cả --</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const hieu = document.getElementById('filterHieu').value;
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const tableBody = document.getElementById('resultsTableBody');
            const statusArea = document.getElementById('statusArea');
            const loading = document.getElementById('loadingIndicator');

            tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center"><div class="flex justify-center"><div class="animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div></div></td></tr>';
            statusArea.innerText = "Đang truy vấn...";
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (hieu) constraints.push(where("hieu_xe", "==", hieu));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            constraints.push(limit(80));

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                tableBody.innerHTML = '';

                let data = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) {
                        data.push(item);
                    }
                });

                if (data.length === 0) {
                    statusArea.innerText = "0 kết quả";
                    tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center font-bold text-gray-400 italic">Không tìm thấy dữ liệu phù hợp với yêu cầu.</td></tr>';
                    return;
                }

                statusArea.innerText = `Tìm thấy ${data.length} báo giá phù hợp`;
                data.forEach(item => {
                    // SỬ DỤNG TRƯỜNG chinh_hang TỪ FIREBASE
                    const isGenuine = item.chinh_hang === "Chính hãng";
                    const tagHtml = isGenuine ? 
                        `<span class="tag-genuine"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"></path></svg>Chính hãng</span>` : 
                        `<span class="tag-aftermarket"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2A1 1 0 004 4.236v5c0 .342.176.66.467.847L4.553 7.106z"></path></svg>Ngoài / Thay thế</span>`;

                    const row = `
                        <tr class="bg-white border-b border-gray-100 hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4">
                                <div class="text-sm font-extrabold text-gray-900 uppercase">${item.ten_phu_tung}</div>
                                <div class="text-[11px] text-gray-400 font-bold mt-1">${item.so_hsbt || 'N/A'}</div>
                            </td>
                            <td class="px-6 py-4">${tagHtml}</td>
                            <td class="px-6 py-4">
                                <div class="text-xs font-bold text-gray-700">${item.hang_xe} ${item.hieu_xe}</div>
                                <div class="text-[10px] text-gray-400 font-semibold mt-0.5">Năm SX: ${item.nam_sx || 'N/A'}</div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-xs font-bold text-gray-700 truncate max-w-[200px]" title="${item.ten_garage}">${item.ten_garage}</div>
                                <div class="text-[10px] text-gray-400 font-semibold mt-0.5 uppercase">${item.tinh_thanh || 'Đắk Lắk'}</div>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <div class="text-base font-black text-emerald-600">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} đ</div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button class="font-bold text-blue-600 hover:underline text-xs">Xem hồ sơ</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (e) {
                console.error(e);
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-bold">Lỗi kết nối Firebase.</td></tr>';
            }
        }

        loadFilters();
    </script>
</body>
</html>
