<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Phụ Tùng Chuyên Nghiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --bg-body: #f1f5f9;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            color: #1e293b;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .desktop-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .filter-panel {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        .filter-input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s;
        }
        .filter-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .search-btn {
            background: var(--primary);
            color: white;
            font-weight: 700;
            padding: 10px 24px;
            border-radius: 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        .part-card {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .part-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-color: var(--primary);
        }
        
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge-genuine { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .badge-aftermarket { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        
        .price-tag {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
        }
        .info-label {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .info-value {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }
        
        /* Loading Shimmer */
        @keyframes loading { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .is-loading { animation: loading 1.5s infinite; }
    </style>
</head>
<body class="antialiased">

    <!-- Header Area -->
    <header class="glass-header">
        <div class="desktop-container px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">TASCO <span class="text-blue-600">DLK</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest leading-none mt-1">Smart Parts Inquiry System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-slate-200 pr-6">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Ngày cập nhật</p>
                    <p class="text-sm font-bold text-slate-700">10/05/2026</p>
                </div>
                <button class="bg-slate-100 p-2.5 rounded-xl text-slate-500 hover:bg-slate-200 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="desktop-container px-6 py-8">
        
        <!-- Search & Filter Panel -->
        <div class="filter-panel p-6 mb-8 flex flex-wrap items-end gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">1. Hãng sản xuất</label>
                <select id="filterHang" class="filter-input" onchange="updateHieuXeDropdown()">
                    <option value="">-- Tất cả hãng --</option>
                </select>
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">2. Dòng xe / Model</label>
                <select id="filterHieu" class="filter-input" onchange="updateNamSXDropdown()">
                    <option value="">-- Tất cả hiệu xe --</option>
                </select>
            </div>
            <div class="w-32">
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">3. Năm SX</label>
                <select id="filterNam" class="filter-input">
                    <option value="">-- Tất cả --</option>
                </select>
            </div>
            <div class="flex-[1.5] min-w-[300px]">
                <label class="block text-[11px] font-bold text-slate-400 uppercase mb-2 ml-1">4. Tên phụ tùng cần tìm</label>
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Nhập tên phụ tùng..." class="filter-input pr-10" onkeydown="if(event.key==='Enter') searchData()">
                    <svg class="w-4 h-4 text-slate-400 absolute right-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
            </div>
            <button onclick="searchData()" class="search-btn h-[42px]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Tra cứu
            </button>
        </div>

        <!-- Result Info -->
        <div class="flex items-center justify-between mb-6 px-2">
            <div>
                <h2 id="statusArea" class="text-sm font-bold text-slate-500 uppercase tracking-wide">Kết quả sẽ hiển thị tại đây</h2>
            </div>
            <div id="loadingIndicator" class="hidden flex items-center gap-2">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-600 border-t-transparent"></div>
                <span class="text-xs font-bold text-blue-600 uppercase">Đang truy vấn dữ liệu...</span>
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultsList" class="result-grid pb-20">
            <!-- Empty state -->
            <div class="col-span-full py-32 flex flex-col items-center justify-center text-slate-400 bg-white/50 border-2 border-dashed border-slate-200 rounded-[32px]">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                <p class="font-bold">Hệ thống sẵn sàng</p>
                <p class="text-xs mt-1 font-medium italic">Vui lòng nhập thông tin xe và phụ tùng để tra cứu báo giá</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; 
        let NAM_ALL = []; 

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => {
                        selectHang.add(new Option(hang, hang));
                    });
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selectHieu = document.getElementById('filterHieu');
            selectHieu.innerHTML = '<option value="">-- Tất cả hiệu xe --</option>';
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => selectHieu.add(new Option(hieu, hieu)));
            }
            fillNamSXDropdown(NAM_ALL);
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const hieu = document.getElementById('filterHieu').value;
            if (hang && hieu && CAY_GIA_PHA[hang][hieu]) {
                fillNamSXDropdown(CAY_GIA_PHA[hang][hieu]);
            } else {
                fillNamSXDropdown(NAM_ALL);
            }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">-- Tất cả --</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const hieu = document.getElementById('filterHieu').value;
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const resultsList = document.getElementById('resultsList');
            const statusArea = document.getElementById('statusArea');
            const loading = document.getElementById('loadingIndicator');

            resultsList.innerHTML = '';
            for(let i=0; i<6; i++) {
                resultsList.innerHTML += '<div class="part-card h-48 bg-white/50 border-slate-100 is-loading"></div>';
            }
            
            statusArea.innerText = "Đang tìm kiếm...";
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (hieu) constraints.push(where("hieu_xe", "==", hieu));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            constraints.push(limit(100));

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                resultsList.innerHTML = '';

                let data = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) {
                        data.push(item);
                    }
                });

                if (data.length === 0) {
                    statusArea.innerText = "Không tìm thấy dữ liệu phù hợp";
                    resultsList.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold">Không tìm thấy báo giá nào khớp với tiêu chí tìm kiếm.</div>';
                    return;
                }

                statusArea.innerText = `Tìm thấy ${data.length} báo giá phù hợp`;
                data.forEach(item => {
                    // SỬ DỤNG TRƯỜNG chinh_hang TỪ FIREBASE
                    const isGenuine = item.chinh_hang === "Chính hãng";
                    const tagClass = isGenuine ? "badge-genuine" : "badge-aftermarket";
                    const tagText = isGenuine ? "Chính hãng" : "Thay thế / Ngoài";
                    const tagIcon = isGenuine ? 
                        '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"/></svg>' :
                        '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2A1 1 0 004 4.236v5c0 .342.176.66.467.847L4.553 7.106z"/></svg>';

                    const card = `
                        <div class="part-card">
                            <div class="flex justify-between items-start">
                                <span class="badge ${tagClass}">
                                    ${tagIcon}
                                    ${tagText}
                                </span>
                                <div class="text-right">
                                    <p class="price-tag">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} <span class="text-xs font-bold opacity-60">đ</span></p>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-wider">Giá duyệt hệ thống</p>
                                </div>
                            </div>
                            
                            <h3 class="text-[15px] font-extrabold text-slate-800 uppercase leading-tight line-clamp-2 h-10" title="${item.ten_phu_tung}">
                                ${item.ten_phu_tung}
                            </h3>
                            
                            <div class="space-y-3 mt-1">
                                <div class="flex items-center gap-3">
                                    <div class="flex-1">
                                        <p class="info-label">Dòng xe áp dụng</p>
                                        <p class="info-value">${item.hang_xe} ${item.hieu_xe} (${item.nam_sx || 'N/A'})</p>
                                    </div>
                                    <div class="flex-1 border-l border-slate-100 pl-3">
                                        <p class="info-label">Địa phương</p>
                                        <p class="info-value truncate">${item.tinh_thanh || 'Đắk Lắk'}</p>
                                    </div>
                                </div>
                                
                                <div class="p-3 bg-slate-50 rounded-xl border border-slate-100">
                                    <p class="info-label">Garage thực hiện</p>
                                    <p class="info-value truncate text-[12px]">${item.ten_garage || 'Đang cập nhật...'}</p>
                                </div>
                            </div>
                            
                            <div class="mt-auto pt-3 border-t border-slate-50 flex items-center justify-between">
                                <p class="text-[10px] font-bold text-slate-400">${item.so_hsbt || 'N/A'}</p>
                                <button class="text-[10px] font-black text-blue-600 hover:text-blue-700 uppercase tracking-wider">Chi tiết hồ sơ</button>
                            </div>
                        </div>
                    `;
                    resultsList.innerHTML += card;
                });

            } catch (e) {
                console.error(e);
                resultsList.innerHTML = '<div class="col-span-full py-20 text-center text-red-500 font-bold">Lỗi kết nối Firebase. Vui lòng kiểm tra lại cấu hình.</div>';
            }
        }

        loadFilters();
    </script>
</body>
</html>
