<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Phụ Tùng Cao Cấp</title>
    <!-- CSS & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-body: #f8fafc;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-body);
            color: #1e293b;
        }
        .main-container { max-width: 1600px; margin: 0 auto; }
        
        /* High-End Input Styling */
        .search-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        .input-wrapper {
            position: relative;
            transition: all 0.2s ease;
        }
        .input-label {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            display: block;
            margin-left: 4px;
        }
        .input-field {
            background-color: #f1f5f9 !important;
            border: 2px solid transparent !important;
            border-radius: 16px !important;
            height: 52px;
            font-weight: 700 !important;
            font-size: 14px !important;
            padding-left: 48px !important;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        .input-field:focus {
            background-color: #ffffff !important;
            border-color: var(--primary) !important;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.15) !important;
            transform: translateY(-2px);
        }
        .input-icon {
            position: absolute;
            left: 16px;
            top: 40px;
            color: #64748b;
            z-index: 10;
            transition: all 0.3s ease;
        }
        .input-wrapper:focus-within .input-icon {
            color: var(--primary);
            transform: scale(1.1);
        }

        /* Premium Table */
        .table-card {
            background: white;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .table-header {
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 32px;
        }
        .data-table thead th {
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 16px 32px;
        }
        .data-table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s;
        }
        .data-table tbody tr:hover {
            background-color: #f8fafc;
        }
        .data-table td {
            padding: 20px 32px;
        }

        /* Custom Dropdown Multi-select */
        .multi-btn {
            background-color: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 16px;
            height: 52px;
            font-weight: 700;
            font-size: 14px;
            padding: 0 16px 0 48px;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }
        .multi-btn:hover, .multi-btn[aria-expanded="true"] {
            background-color: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.1) ;
        }
        
        .badge-gradient {
            background: linear-gradient(135deg, #def7ec 0%, #d1fae5 100%);
            color: #065f46;
            border: 1px solid #a7f3d0;
            box-shadow: 0 2px 4px rgba(5, 150, 105, 0.1);
        }
        .badge-aftermarket {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .search-btn {
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
        }
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header Area -->
    <header class="px-8 py-6 flex items-center justify-between main-container">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/30">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight leading-none">TASCO <span class="text-blue-600">DLK</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1.5">Intelligent Parts Search Engine</p>
            </div>
        </div>
        <button onclick="exportToCSV()" class="flex items-center gap-2 bg-white border border-slate-200 px-6 py-3 rounded-2xl font-bold text-sm text-slate-600 shadow-sm hover:bg-slate-50 transition-all">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Xuất báo cáo Excel
        </button>
    </header>

    <main class="main-container px-8 pb-12">
        
        <!-- Premium Search Panel -->
        <div class="search-container mb-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                <div class="md:col-span-2 input-wrapper">
                    <label class="input-label">Hãng xe</label>
                    <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    <select id="filterHang" onchange="updateHieuXeDropdown()" class="input-field appearance-none cursor-pointer">
                        <option value="">Chọn hãng</option>
                    </select>
                </div>
                <div class="md:col-span-3 input-wrapper">
                    <label class="input-label">Dòng xe (Chọn nhiều)</label>
                    <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <button id="multiHieuBtn" data-dropdown-toggle="dropdownMultiHieu" class="multi-btn text-slate-400">
                        Chọn hiệu xe...
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div id="dropdownMultiHieu" class="z-50 hidden bg-white rounded-2xl shadow-2xl border border-slate-100 w-80 p-3">
                        <div id="hieuXeCheckboxes" class="max-h-60 overflow-y-auto space-y-1">
                            <p class="text-[11px] text-slate-400 italic p-3">Vui lòng chọn hãng xe trước</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-2 input-wrapper">
                    <label class="input-label">Năm sản xuất</label>
                    <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <select id="filterNam" class="input-field appearance-none cursor-pointer">
                        <option value="">Tất cả các năm</option>
                    </select>
                </div>
                <div class="md:col-span-3 input-wrapper">
                    <label class="input-label">Tìm tên phụ tùng</label>
                    <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Ví dụ: Đèn hậu, gương..." class="input-field" onkeydown="if(event.key==='Enter') searchData()">
                </div>
                <div class="md:col-span-2">
                    <button onclick="searchData()" class="w-full search-btn text-white flex items-center justify-center gap-2">
                        Truy vấn ngay
                    </button>
                </div>
            </div>

            <!-- Integrated Toolbar -->
            <div class="mt-10 flex flex-wrap items-center justify-between pt-8 border-t border-slate-100 gap-6">
                <div class="flex items-center gap-10">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tổng kết quả</span>
                        <span id="statCount" class="text-2xl font-black text-slate-900">0</span>
                    </div>
                    <div class="h-10 w-px bg-slate-100"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Loại hàng</span>
                        <select id="filterType" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-blue-600 cursor-pointer">
                            <option value="all">Tất cả loại hàng</option>
                            <option value="genuine">Chính hãng</option>
                            <option value="aftermarket">Thay thế</option>
                        </select>
                    </div>
                    <div class="h-10 w-px bg-slate-100"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Sắp xếp giá</span>
                        <select id="sortPrice" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-blue-600 cursor-pointer">
                            <option value="none">Mặc định</option>
                            <option value="asc">Thấp đến cao</option>
                            <option value="desc">Cao đến thấp</option>
                        </select>
                    </div>
                </div>
                
                <div id="loadingIndicator" class="hidden flex items-center gap-3 px-4 py-2 bg-blue-50 text-blue-600 rounded-xl">
                    <div class="animate-spin rounded-full h-4 w-4 border-2 border-current border-t-transparent"></div>
                    <span class="text-[11px] font-black uppercase">Đang truy vấn...</span>
                </div>
            </div>
        </div>

        <!-- Result Table Section -->
        <div class="table-card">
            <div class="table-header flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Dòng hiển thị:</label>
                    <select id="pageSize" onchange="changePageSize()" class="bg-white border border-slate-200 text-slate-900 text-[11px] font-black rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-2 px-4 shadow-sm">
                        <option value="10">10 dòng / trang</option>
                        <option value="25">25 dòng / trang</option>
                        <option value="50">50 dòng / trang</option>
                    </select>
                </div>
                <div class="flex items-center gap-6">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest" id="pageInfo">Trang 0 / 0</span>
                    <div class="flex gap-2">
                        <button id="btnPrev" onclick="changePage(-1)" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-blue-600 disabled:opacity-30 transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="btnNext" onclick="changePage(1)" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-500 hover:bg-slate-50 hover:text-blue-600 disabled:opacity-30 transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto min-h-[500px]">
                <table class="data-table w-full text-sm text-left">
                    <thead>
                        <tr>
                            <th>Phụ tùng</th>
                            <th>Loại hàng</th>
                            <th>Chi tiết xe</th>
                            <th>Đơn vị báo giá</th>
                            <th class="text-right">Đơn giá đã duyệt</th>
                            <th class="text-center">Tác vụ</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="6" class="px-6 py-40 text-center text-slate-300 font-bold uppercase tracking-[0.2em] italic text-xs">Vui lòng thiết lập bộ lọc</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; 
        let NAM_ALL = []; 
        let MASTER_DATA = []; 
        let FILTERED_DATA = []; 
        let CURRENT_PAGE = 1;
        let ITEMS_PER_PAGE = 10;

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => selectHang.add(new Option(hang, hang)));
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const container = document.getElementById('hieuXeCheckboxes');
            const btn = document.getElementById('multiHieuBtn');
            container.innerHTML = '';
            btn.innerText = "Chọn hiệu xe...";
            btn.classList.add('text-slate-400');
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition-all';
                    label.innerHTML = `<input type="checkbox" name="hieu_xe" value="${hieu}" onchange="onHieuXeChange()" class="w-5 h-5 text-blue-600 rounded-md border-slate-300 focus:ring-blue-500"> <span class="text-sm font-bold text-slate-700">${hieu}</span>`;
                    container.appendChild(label);
                });
            } else {
                container.innerHTML = '<p class="text-[11px] text-slate-400 italic p-3">Chọn hãng xe trước</p>';
            }
            fillNamSXDropdown(NAM_ALL);
        }

        window.onHieuXeChange = function() {
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const btn = document.getElementById('multiHieuBtn');
            if (selectedHieus.length > 0) {
                btn.innerText = `${selectedHieus.length} dòng xe đã chọn`;
                btn.classList.remove('text-slate-400');
                btn.classList.add('text-slate-900');
            } else {
                btn.innerText = "Chọn hiệu xe...";
                btn.classList.add('text-slate-400');
                btn.classList.remove('text-slate-900');
            }
            updateNamSXDropdown();
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            let combinedNams = new Set();
            if (hang && selectedHieus.length > 0) {
                selectedHieus.forEach(h => { if (CAY_GIA_PHA[hang][h]) CAY_GIA_PHA[hang][h].forEach(n => combinedNams.add(n)); });
                fillNamSXDropdown(Array.from(combinedNams));
            } else {
                fillNamSXDropdown(NAM_ALL);
            }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">Tất cả các năm</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const tableBody = document.getElementById('resultsTableBody');
            const loading = document.getElementById('loadingIndicator');

            tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center"><div class="flex justify-center items-center gap-3"><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce"></div><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></div></div></td></tr>';
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (selectedHieus.length > 0) constraints.push(where("hieu_xe", "in", selectedHieus.slice(0, 30)));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            constraints.push(limit(500)); 

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                MASTER_DATA = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) MASTER_DATA.push(item);
                });
                applyLocalFilters();
            } catch (e) {
                console.error(e);
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-bold uppercase text-xs">Lỗi kết nối.</td></tr>';
            }
        }

        window.applyLocalFilters = function() {
            const typeFilter = document.getElementById('filterType').value;
            const sortOrder = document.getElementById('sortPrice').value;
            FILTERED_DATA = MASTER_DATA.filter(item => {
                if (typeFilter === 'all') return true;
                if (typeFilter === 'genuine') return item.chinh_hang === "Chính hãng";
                if (typeFilter === 'aftermarket') return item.chinh_hang !== "Chính hãng";
                return true;
            });
            if (sortOrder === 'asc') FILTERED_DATA.sort((a,b) => (a.gia_duyet || 0) - (b.gia_duyet || 0));
            else if (sortOrder === 'desc') FILTERED_DATA.sort((a,b) => (b.gia_duyet || 0) - (a.gia_duyet || 0));
            document.getElementById('statCount').innerText = FILTERED_DATA.length;
            CURRENT_PAGE = 1;
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('resultsTableBody');
            const totalPages = Math.ceil(FILTERED_DATA.length / ITEMS_PER_PAGE);
            if (FILTERED_DATA.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-32 text-center font-black text-slate-300 uppercase tracking-widest text-xs italic">Không tìm thấy dữ liệu phù hợp</td></tr>';
                updatePaginationUI(0);
                return;
            }
            const startIndex = (CURRENT_PAGE - 1) * ITEMS_PER_PAGE;
            const pageData = FILTERED_DATA.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            tableBody.innerHTML = '';
            pageData.forEach(item => {
                const isGenuine = item.chinh_hang === "Chính hãng";
                const badgeHtml = isGenuine ? 
                    `<span class="badge-pro badge-gradient"><svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"></path></svg>Chính hãng</span>` : 
                    `<span class="badge-pro badge-aftermarket"><svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2A1 1 0 004 4.236v5c0 .342.176.66.467.847L4.553 7.106z"></path></svg>Thay thế</span>`;
                const rowHtml = `
                    <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                        <td class="px-8 py-5">
                            <div class="text-[14px] font-extrabold text-slate-900 uppercase leading-tight">${item.ten_phu_tung}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-2 tracking-widest uppercase">${item.so_hsbt || 'N/A'}</div>
                        </td>
                        <td class="px-8 py-5">${badgeHtml}</td>
                        <td class="px-8 py-5">
                            <div class="text-[12px] font-extrabold text-slate-700">${item.hang_xe} ${item.hieu_xe}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1.5 uppercase">Sản xuất: ${item.nam_sx || '0'}</div>
                        </td>
                        <td class="px-8 py-5">
                            <div class="text-[12px] font-bold text-slate-700 truncate max-w-[220px]" title="${item.ten_garage}">${item.ten_garage || 'KHÁC'}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1.5 uppercase tracking-wider">${item.tinh_thanh || 'Toàn quốc'}</div>
                        </td>
                        <td class="px-8 py-5 text-right">
                            <div class="text-[18px] font-black text-blue-600">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} <span class="text-[10px] opacity-60">đ</span></div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="copyPrice('${item.gia_duyet}')" class="p-3 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-2xl transition-all shadow-sm"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
                                <button class="text-[10px] font-black text-slate-400 hover:text-slate-900 uppercase tracking-widest px-4 py-2.5 rounded-xl hover:bg-slate-100 transition-all">Chi tiết</button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += rowHtml;
            });
            updatePaginationUI(totalPages);
            document.getElementById('statusArea').innerText = `Kết quả ${startIndex + 1} - ${Math.min(startIndex + ITEMS_PER_PAGE, FILTERED_DATA.length)} / ${FILTERED_DATA.length}`;
        }

        function updatePaginationUI(totalPages) {
            document.getElementById('pageInfo').innerText = `Trang ${FILTERED_DATA.length > 0 ? CURRENT_PAGE : 0} / ${totalPages}`;
            document.getElementById('btnPrev').disabled = CURRENT_PAGE <= 1;
            document.getElementById('btnNext').disabled = CURRENT_PAGE >= totalPages;
        }

        window.changePage = function(offset) {
            CURRENT_PAGE += offset;
            renderTable();
        }

        window.changePageSize = function() {
            ITEMS_PER_PAGE = parseInt(document.getElementById('pageSize').value);
            CURRENT_PAGE = 1;
            renderTable();
        }

        window.copyPrice = function(price) {
            navigator.clipboard.writeText(price).then(() => {
                alert("Đã sao chép giá: " + price + " đ");
            });
        }

        window.exportToCSV = function() {
            if (FILTERED_DATA.length === 0) return alert("Không có dữ liệu để xuất!");
            let csv = "\uFEFF"; 
            csv += "Tên phụ tùng,Hãng xe,Hiệu xe,Năm SX,Loại hàng,Garage,Đơn giá duyệt\n";
            FILTERED_DATA.forEach(i => {
                csv += `"${i.ten_phu_tung}","${i.hang_xe}","${i.hieu_xe}","${i.nam_sx}","${i.chinh_hang}","${i.ten_garage}","${i.gia_duyet}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "bao_gia_phu_tung.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadFilters();
    </script>
</body>
</html>
