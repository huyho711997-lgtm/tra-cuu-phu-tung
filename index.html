<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Tra Cứu Phụ Tùng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .flat-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; }
        .flat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
        .badge-price { background-color: #dcfce7; color: #15803d; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-2xl font-extrabold tracking-tight text-blue-700">TASCO ĐẮK LẮK</h1>
            <p class="text-slate-500 font-medium">Hệ thống tra cứu dữ liệu bồi thường</p>
        </div>

        <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-200 mb-6 flex items-center">
            <input type="text" id="searchInput" placeholder="Nhập tên phụ tùng (vd: que thăm dầu)..." 
                   class="w-full p-4 rounded-xl focus:outline-none text-lg">
            <button onclick="searchData()" class="bg-blue-600 text-white font-bold py-3 px-6 rounded-xl ml-2 hover:bg-blue-700 transition-colors">
                TÌM
            </button>
        </div>

        <div id="statusArea" class="text-sm text-slate-400 mb-4 px-2"></div>
        <div id="resultsList" class="space-y-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyCIPwR1YTyot_BU-6B5YcaO0MLcd3pl-Eo",
            authDomain: "he-thong-tra-cuu-phu-tung.firebaseapp.com",
            projectId: "he-thong-tra-cuu-phu-tung",
            storageBucket: "he-thong-tra-cuu-phu-tung.firebasestorage.app",
            messagingSenderId: "1081518139126",
            appId: "1:1081518139126:web:ee81d2477638826b94eed7",
            measurementId: "G-1BFCZ0V268"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.searchData = async function() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsList = document.getElementById('resultsList');
            const statusArea = document.getElementById('statusArea');

            if (!input) return;

            resultsList.innerHTML = '<div class="text-center py-12 text-slate-400">Đang lục tìm trong kho dữ liệu...</div>';
            statusArea.innerText = "";
            
            try {
                // Lưu ý: Firebase tìm kiếm chính xác, nên từ khóa cần khớp với cột 'ten_phu_tung'
                const q = query(
                    collection(db, "LichSuBaoGia"), 
                    where("ten_phu_tung", "==", input), 
                    limit(50)
                );

                const querySnapshot = await getDocs(q);
                resultsList.innerHTML = '';
                
                if (querySnapshot.empty) {
                    resultsList.innerHTML = `
                        <div class="bg-amber-50 border border-amber-100 p-6 rounded-xl text-amber-700 text-center">
                            Không tìm thấy dữ liệu cho từ khóa này.
                        </div>`;
                    return;
                }

                statusArea.innerText = `Tìm thấy ${querySnapshot.size} kết quả gần nhất.`;

                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const card = `
                        <div class="flat-card p-5">
                            <div class="flex justify-between items-start mb-4">
                                <div class="flex-1">
                                    <p class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-1">${item.so_hsbt}</p>
                                    <h3 class="font-bold text-lg text-slate-800 leading-tight uppercase">${item.ten_phu_tung}</h3>
                                </div>
                                <div class="badge-price">
                                    ${new Intl.NumberFormat('vi-VN').format(item.gia_duyet)} đ
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-y-3 border-t border-slate-50 pt-4">
                                <div>
                                    <p class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">Xe & Đời</p>
                                    <p class="text-sm font-semibold text-slate-700">${item.hang_xe} ${item.hieu_xe} (${item.nam_sx})</p>
                                </div>
                                <div>
                                    <p class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">Khu vực</p>
                                    <p class="text-sm font-semibold text-slate-700">${item.tinh_thanh || 'N/A'}</p>
                                </div>
                                <div class="col-span-2">
                                    <p class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">Garage báo giá</p>
                                    <p class="text-sm font-medium text-slate-600 truncate">${item.ten_garage}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    resultsList.innerHTML += card;
                });

            } catch (error) {
                console.error("Lỗi: ", error);
                resultsList.innerHTML = '<div class="text-red-500 text-center">Lỗi kết nối Firebase. Vui lòng kiểm tra lại.</div>';
            }
        }
    </script>
</body>
</html>
