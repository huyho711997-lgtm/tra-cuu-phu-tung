<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Phụ Tùng Cao Cấp</title>
    <!-- CSS & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #dbeafe;
            --accent: #10b981;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            min-height: 100vh;
        }
        .main-container { max-width: 1540px; margin: 0 auto; padding: 2rem; }
        
        /* Glassmorphism Control Center */
        .control-center {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }

        /* Standardized Inputs */
        .field-group { position: relative; }
        .field-label {
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 10px;
            display: block;
        }
        .pro-input {
            width: 100%;
            height: 52px;
            background: #ffffff !important;
            border: 1.5px solid #e2e8f0 !important;
            border-radius: 16px !important;
            padding-left: 44px !important;
            font-size: 14px !important;
            font-weight: 700 !important;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
            color: #1e293b;
        }
        .pro-input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important;
            transform: translateY(-1px);
        }
        .field-icon {
            position: absolute;
            left: 16px;
            top: 39px;
            color: #94a3b8;
            z-index: 10;
        }

        /* Multi-select Dropdown Custom */
        .multi-btn {
            width: 100%;
            height: 52px;
            background: white;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            padding: 0 16px 0 44px;
            font-size: 14px;
            font-weight: 700;
            text-align: left;
            color: #1e293b;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .multi-btn:hover { border-color: #cbd5e1; }
        
        /* Table Style */
        .table-section {
            background: white;
            border-radius: 28px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .data-table thead th {
            background: #f8fafc;
            padding: 18px 24px;
            font-size: 11px;
            font-weight: 800;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid #f1f5f9;
        }
        .data-table tbody tr { border-bottom: 1px solid #f1f5f9; transition: all 0.2s; }
        .data-table tbody tr:hover { background: #f8fafc; }
        .data-table td { padding: 20px 24px; }

        /* Status Badges */
        .badge-base {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .badge-genuine { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .badge-aftermarket { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        
        .price-text { font-size: 18px; font-weight: 900; color: var(--primary); }
        
        .search-btn {
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
            transition: all 0.3s;
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.4); }

        .error-banner {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 16px;
            padding: 16px;
            color: #991b1b;
            margin-bottom: 1.5rem;
            display: none;
        }
        .error-banner a { text-decoration: underline; font-weight: 800; }
    </style>
</head>
<body class="antialiased">

    <div class="main-container">
        <!-- Header -->
        <header class="flex items-center justify-between mb-10 px-4">
            <div class="flex items-center gap-5">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-blue-500/30">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter leading-none">TASCO <span class="text-blue-600">DLK</span></h1>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-2">Hệ thống tra cứu dữ liệu phụ tùng</p>
                </div>
            </div>
            <button onclick="exportToCSV()" class="bg-white border border-slate-200 px-6 py-3 rounded-2xl font-bold text-sm text-slate-600 shadow-sm hover:shadow-md transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Xuất Excel
            </button>
        </header>

        <!-- Error Banner -->
        <div id="errorBanner" class="error-banner">
            <p id="errorMessage"></p>
        </div>

        <!-- Control Center -->
        <div class="control-center">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end mb-8">
                <div class="md:col-span-2 field-group">
                    <label class="field-label">1. Hãng xe</label>
                    <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    <select id="filterHang" onchange="updateHieuXeDropdown()" class="pro-input appearance-none cursor-pointer">
                        <option value="">Tất cả hãng</option>
                    </select>
                </div>
                <div class="md:col-span-3 field-group">
                    <label class="field-label">2. Dòng xe (Chọn nhiều)</label>
                    <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <button id="multiHieuBtn" data-dropdown-toggle="dropdownHieu" class="multi-btn">
                        <span class="truncate">Tất cả dòng xe</span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div id="dropdownHieu" class="z-50 hidden bg-white rounded-2xl shadow-2xl border border-slate-100 w-80 p-3">
                        <div id="hieuXeCheckboxes" class="max-h-64 overflow-y-auto space-y-1">
                            <p class="text-[11px] text-slate-400 italic p-3">Vui lòng chọn hãng xe trước</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-2 field-group">
                    <label class="field-label">3. Năm SX</label>
                    <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <select id="filterNam" class="pro-input appearance-none cursor-pointer">
                        <option value="">Tất cả các năm</option>
                    </select>
                </div>
                <div class="md:col-span-3 field-group">
                    <label class="field-label">4. Tên linh kiện</label>
                    <svg class="w-5 h-5 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Tìm tên phụ tùng..." class="pro-input" onkeydown="if(event.key==='Enter') searchData()">
                </div>
                <div class="md:col-span-2">
                    <button onclick="searchData()" class="w-full search-btn">Truy vấn</button>
                </div>
            </div>

            <!-- Dashboard Mini Stats -->
            <div class="flex flex-wrap items-center gap-12 pt-8 border-t border-slate-200/50">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Tổng kết quả</span>
                    <span id="statCount" class="text-2xl font-black text-slate-900">0</span>
                </div>
                <div class="h-10 w-px bg-slate-200"></div>
                <div class="flex flex-col flex-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Loại hàng</span>
                    <select id="filterType" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-blue-600 cursor-pointer">
                        <option value="all">Tất cả loại hàng</option>
                        <option value="genuine">Chính hãng</option>
                        <option value="aftermarket">Thay thế / Ngoài</option>
                    </select>
                </div>
                <div class="h-10 w-px bg-slate-200"></div>
                <div class="flex flex-col flex-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Sắp xếp đơn giá</span>
                    <select id="sortPrice" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-blue-600 cursor-pointer">
                        <option value="none">Mặc định</option>
                        <option value="asc">Từ thấp đến cao</option>
                        <option value="desc">Từ cao đến thấp</option>
                    </select>
                </div>
                <div id="loadingIndicator" class="hidden flex items-center gap-3 px-4 py-2 bg-blue-50 text-blue-600 rounded-xl">
                    <div class="animate-spin rounded-full h-4 w-4 border-2 border-current border-t-transparent"></div>
                    <span class="text-[11px] font-black">ĐANG XỬ LÝ...</span>
                </div>
            </div>
        </div>

        <!-- Data Table Section -->
        <div class="table-section">
            <div class="px-8 py-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Dòng hiển thị:</label>
                    <select id="pageSize" onchange="changePageSize()" class="bg-white border border-slate-200 text-slate-900 text-[11px] font-bold rounded-xl p-1.5 px-4">
                        <option value="10">10 dòng</option>
                        <option value="25">25 dòng</option>
                        <option value="50">50 dòng</option>
                    </select>
                </div>
                <div class="flex items-center gap-6">
                    <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest" id="pageInfo">Trang 0 / 0</span>
                    <div class="flex gap-2">
                        <button id="btnPrev" onclick="changePage(-1)" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-blue-600 disabled:opacity-30 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="btnNext" onclick="changePage(1)" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-blue-600 disabled:opacity-30 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto min-h-[500px]">
                <table class="data-table w-full text-sm text-left">
                    <thead>
                        <tr>
                            <th>Phụ tùng & Mã số</th>
                            <th>Phân loại</th>
                            <th>Thông tin xe</th>
                            <th>Đơn vị báo giá</th>
                            <th class="text-right">Đơn giá duyệt</th>
                            <th class="text-center">Tác vụ</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="6" class="px-6 py-40 text-center text-slate-300 font-bold uppercase italic text-xs tracking-widest">Sẵn sàng tra cứu dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; 
        let NAM_ALL = []; 
        let MASTER_DATA = []; 
        let FILTERED_DATA = []; 
        let CURRENT_PAGE = 1;
        let ITEMS_PER_PAGE = 10;

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => selectHang.add(new Option(hang, hang)));
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const container = document.getElementById('hieuXeCheckboxes');
            const btn = document.getElementById('multiHieuBtn');
            container.innerHTML = '';
            btn.innerHTML = '<span>Tất cả dòng xe</span><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>';
            
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-3 p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition-all';
                    label.innerHTML = `<input type="checkbox" name="hieu_xe" value="${hieu}" onchange="onHieuXeChange()" class="w-5 h-5 text-blue-600 rounded-md border-slate-300 focus:ring-blue-500"> <span class="text-sm font-bold text-slate-700">${hieu}</span>`;
                    container.appendChild(label);
                });
            } else {
                container.innerHTML = '<p class="text-[11px] text-slate-400 italic p-3">Vui lòng chọn hãng xe trước</p>';
            }
            fillNamSXDropdown(NAM_ALL);
        }

        window.onHieuXeChange = function() {
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const btn = document.getElementById('multiHieuBtn');
            if (selectedHieus.length > 0) {
                btn.innerHTML = `<span class="truncate">${selectedHieus.length} dòng xe đã chọn</span><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>`;
            } else {
                btn.innerHTML = '<span>Tất cả dòng xe</span><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>';
            }
            updateNamSXDropdown();
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            let combinedNams = new Set();
            if (hang && selectedHieus.length > 0) {
                selectedHieus.forEach(h => { if (CAY_GIA_PHA[hang][h]) CAY_GIA_PHA[hang][h].forEach(n => combinedNams.add(n)); });
                fillNamSXDropdown(Array.from(combinedNams));
            } else {
                fillNamSXDropdown(NAM_ALL);
            }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">Tất cả các năm</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const tableBody = document.getElementById('resultsTableBody');
            const loading = document.getElementById('loadingIndicator');
            const errorBanner = document.getElementById('errorBanner');

            errorBanner.style.display = 'none';
            tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center"><div class="flex justify-center items-center gap-2"><div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce"></div><div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></div></div></td></tr>';
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (selectedHieus.length > 0) constraints.push(where("hieu_xe", "in", selectedHieus.slice(0, 30)));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            constraints.push(limit(500)); 

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                MASTER_DATA = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) MASTER_DATA.push(item);
                });
                applyLocalFilters();
            } catch (e) {
                loading.classList.add('hidden');
                console.error(e);
                let msg = "Lỗi kết nối cơ sở dữ liệu. ";
                if (e.message && e.message.includes("index")) {
                    msg = `Hệ thống yêu cầu tạo Index cho truy vấn này. <a href="${extractIndexUrl(e.message)}" target="_blank">Nhấn vào đây để tạo Index</a> sau đó thử lại.`;
                }
                errorBanner.style.display = 'block';
                document.getElementById('errorMessage').innerHTML = msg;
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-bold uppercase text-xs italic">Truy vấn thất bại</td></tr>';
            }
        }

        function extractIndexUrl(message) {
            const match = message.match(/https:\/\/console\.firebase\.google\.com[^\s]*/);
            return match ? match[0] : "#";
        }

        window.applyLocalFilters = function() {
            const typeFilter = document.getElementById('filterType').value;
            const sortOrder = document.getElementById('sortPrice').value;
            FILTERED_DATA = MASTER_DATA.filter(item => {
                const chinhHangValue = (item.chinh_hang || '').toLowerCase();
                if (typeFilter === 'all') return true;
                if (typeFilter === 'genuine') return chinhHangValue.includes("chính hãng");
                if (typeFilter === 'aftermarket') return !chinhHangValue.includes("chính hãng");
                return true;
            });
            if (sortOrder === 'asc') FILTERED_DATA.sort((a,b) => (a.gia_duyet || 0) - (b.gia_duyet || 0));
            else if (sortOrder === 'desc') FILTERED_DATA.sort((a,b) => (b.gia_duyet || 0) - (a.gia_duyet || 0));
            document.getElementById('statCount').innerText = FILTERED_DATA.length;
            CURRENT_PAGE = 1;
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('resultsTableBody');
            const totalPages = Math.ceil(FILTERED_DATA.length / ITEMS_PER_PAGE);
            if (FILTERED_DATA.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-32 text-center font-black text-slate-300 uppercase tracking-widest text-xs italic">Không tìm thấy dữ liệu phù hợp</td></tr>';
                updatePaginationUI(0);
                return;
            }
            const startIndex = (CURRENT_PAGE - 1) * ITEMS_PER_PAGE;
            const pageData = FILTERED_DATA.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            tableBody.innerHTML = '';
            pageData.forEach(item => {
                const chinhHangValue = (item.chinh_hang || '').toLowerCase();
                const isGenuine = chinhHangValue.includes("chính hãng");
                const badgeHtml = isGenuine ? 
                    `<span class="badge-base badge-genuine"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"></path></svg>Chính hãng</span>` : 
                    `<span class="badge-base badge-aftermarket"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2A1 1 0 004 4.236v5c0 .342.176.66.467.847L4.553 7.106z"></path></svg>Thay thế</span>`;
                const rowHtml = `
                    <tr class="hover:bg-slate-50 transition-all border-b border-slate-50">
                        <td class="px-8 py-5">
                            <div class="text-[14px] font-black text-slate-900 uppercase leading-tight">${item.ten_phu_tung}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-2 tracking-widest uppercase">${item.so_hsbt || 'N/A'}</div>
                        </td>
                        <td class="px-8 py-5">${badgeHtml}</td>
                        <td class="px-8 py-5">
                            <div class="text-[12px] font-black text-slate-700">${item.hang_xe} ${item.hieu_xe}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1.5 uppercase">Năm SX: ${item.nam_sx || '0'}</div>
                        </td>
                        <td class="px-8 py-5">
                            <div class="text-[12px] font-bold text-slate-700 truncate max-w-[220px]" title="${item.ten_garage}">${item.ten_garage || 'KHÁC'}</div>
                            <div class="text-[10px] text-slate-400 font-bold mt-1.5 uppercase tracking-wider">${item.tinh_thanh || 'Toàn quốc'}</div>
                        </td>
                        <td class="px-8 py-5 text-right">
                            <div class="price-text">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} <span class="text-[10px] opacity-60 font-bold">đ</span></div>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="copyPrice('${item.gia_duyet}')" class="p-3 text-slate-300 hover:text-blue-600 hover:bg-blue-50 rounded-2xl transition-all"><svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
                                <button class="text-[10px] font-black text-slate-400 hover:text-slate-900 uppercase tracking-widest px-4 py-2.5 rounded-xl hover:bg-slate-100 transition-all">Chi tiết</button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += rowHtml;
            });
            updatePaginationUI(totalPages);
            document.getElementById('pageInfo').innerText = `Trang ${FILTERED_DATA.length > 0 ? CURRENT_PAGE : 0} / ${totalPages}`;
        }

        function updatePaginationUI(totalPages) {
            document.getElementById('btnPrev').disabled = CURRENT_PAGE <= 1;
            document.getElementById('btnNext').disabled = CURRENT_PAGE >= totalPages;
        }

        window.changePage = function(offset) {
            CURRENT_PAGE += offset;
            renderTable();
        }

        window.changePageSize = function() {
            ITEMS_PER_PAGE = parseInt(document.getElementById('pageSize').value);
            CURRENT_PAGE = 1;
            renderTable();
        }

        window.copyPrice = function(price) {
            navigator.clipboard.writeText(price).then(() => {
                alert("Đã sao chép đơn giá thành công!");
            });
        }

        window.exportToCSV = function() {
            if (FILTERED_DATA.length === 0) return alert("Không có dữ liệu để xuất!");
            let csv = "\uFEFF"; 
            csv += "Tên phụ tùng,Hãng xe,Hiệu xe,Năm SX,Loại hàng,Garage,Đơn giá duyệt\n";
            FILTERED_DATA.forEach(i => {
                csv += `"${i.ten_phu_tung}","${i.hang_xe}","${i.hieu_xe}","${i.nam_sx}","${i.chinh_hang}","${i.ten_garage}","${i.gia_duyet}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "bao_gia_phu_tung.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadFilters();
    </script>
</body>
</html>
