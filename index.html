<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Phụ Tùng Cao Cấp</title>
    <!-- CSS & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --primary-hover: #1d4ed8; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .main-container { max-width: 1580px; margin: 0 auto; padding: 1.5rem; }
        
        /* Unified Control Center */
        .control-panel {
            background: #ffffff;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        
        .field-group { position: relative; }
        .field-label {
            font-size: 11px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            display: block;
        }
        .pro-input {
            width: 100%;
            height: 48px;
            background: #f8fafc !important;
            border: 1px solid #e2e8f0 !important;
            border-radius: 12px !important;
            padding-left: 40px !important;
            font-size: 13px !important;
            font-weight: 700 !important;
            color: #1e293b;
            transition: all 0.2s;
        }
        .pro-input:focus {
            background: #ffffff !important;
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08) !important;
        }
        .field-icon { position: absolute; left: 14px; top: 35px; color: #94a3b8; z-index: 10; pointer-events: none; }

        .multi-btn {
            width: 100%;
            height: 48px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 0 16px 0 40px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        
        /* Table Styling */
        .data-section { background: white; border-radius: 24px; border: 1px solid #e2e8f0; overflow: hidden; }
        .data-table thead th { background: #f8fafc; padding: 16px 24px; font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; border-bottom: 1px solid #f1f5f9; }
        .data-table td { padding: 16px 24px; vertical-align: middle; border-bottom: 1px solid #f8fafc; }
        
        .badge-pro { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; gap: 6px; }
        .badge-genuine { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .badge-aftermarket { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        
        .price-text { font-size: 17px; font-weight: 900; color: #0f172a; }
        .search-btn {
            width: 100%;
            height: 48px;
            background: var(--primary);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            border-radius: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }
        .search-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .index-error {
            background: #fff1f2;
            border: 1px solid #fecdd3;
            padding: 1rem;
            border-radius: 12px;
            color: #9f1239;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
        .index-error a { font-weight: 800; text-decoration: underline; color: #e11d48; }
    </style>
</head>
<body class="antialiased">

    <div class="main-container">
        <!-- Logo & Title -->
        <header class="flex items-center justify-between mb-8 px-2">
            <div class="flex items-center gap-4">
                <div class="w-11 h-11 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 tracking-tighter">TASCO <span class="text-blue-600">DLK</span></h1>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Hệ thống tra cứu phụ tùng</p>
                </div>
            </div>
            <button onclick="exportToCSV()" class="bg-white border border-slate-200 px-5 py-2.5 rounded-xl font-bold text-xs text-slate-600 hover:bg-slate-50 transition-all flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Xuất Excel
            </button>
        </header>

        <!-- Index Error Banner -->
        <div id="indexErrorBanner" class="index-error">
            <div class="flex items-start gap-3">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                <p id="indexErrorMessage"></p>
            </div>
        </div>

        <!-- Unified Control Panel -->
        <div class="control-panel">
            <div class="grid grid-cols-1 md:grid-cols-10 gap-5 items-end">
                <div class="md:col-span-2 field-group">
                    <label class="field-label">Hãng xe</label>
                    <svg class="w-4 h-4 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                    <select id="filterHang" onchange="updateHieuXeDropdown()" class="pro-input appearance-none">
                        <option value="">Tất cả hãng</option>
                    </select>
                </div>
                <div class="md:col-span-2 field-group">
                    <label class="field-label">Dòng xe</label>
                    <svg class="w-4 h-4 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <button id="multiHieuBtn" data-dropdown-toggle="dropdownHieu" class="multi-btn">
                        <span class="truncate">Chọn dòng xe...</span>
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div id="dropdownHieu" class="z-50 hidden bg-white rounded-xl shadow-xl border border-slate-100 w-72 p-2">
                        <div id="hieuXeCheckboxes" class="max-h-60 overflow-y-auto space-y-0.5">
                            <p class="text-[11px] text-slate-400 italic p-3">Chọn hãng xe trước</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-1 field-group">
                    <label class="field-label">Năm SX</label>
                    <svg class="w-4 h-4 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    <select id="filterNam" class="pro-input appearance-none">
                        <option value="">Tất cả</option>
                    </select>
                </div>
                <div class="md:col-span-2 field-group">
                    <label class="field-label">Loại hàng</label>
                    <svg class="w-4 h-4 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                    <select id="filterType" class="pro-input appearance-none">
                        <option value="all">Tất cả loại hàng</option>
                        <option value="genuine">Chính hãng</option>
                        <option value="aftermarket">Thay thế / Ngoài</option>
                    </select>
                </div>
                <div class="md:col-span-2 field-group">
                    <label class="field-label">Tên phụ tùng</label>
                    <svg class="w-4 h-4 field-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input type="text" id="searchInput" placeholder="Tìm tên..." class="pro-input" onkeydown="if(event.key==='Enter') searchData()">
                </div>
                <div class="md:col-span-1">
                    <button onclick="searchData()" class="search-btn">Tìm</button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="data-section">
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Hiển thị:</span>
                        <select id="pageSize" onchange="changePageSize()" class="bg-white border border-slate-200 text-[11px] font-bold rounded-lg p-1 px-3">
                            <option value="10">10 dòng</option>
                            <option value="25">25 dòng</option>
                            <option value="50">50 dòng</option>
                        </select>
                    </div>
                    <div class="h-4 w-px bg-slate-200"></div>
                    <div class="flex flex-col">
                        <span id="statCount" class="text-xs font-black text-slate-900">0 kết quả</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div id="loadingIndicator" class="hidden flex items-center gap-2 text-blue-600">
                        <div class="animate-spin rounded-full h-3 w-3 border-2 border-current border-t-transparent"></div>
                        <span class="text-[10px] font-black uppercase">Đang tải...</span>
                    </div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase" id="pageInfo">Trang 0 / 0</span>
                    <div class="flex gap-1">
                        <button id="btnPrev" onclick="changePage(-1)" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-blue-600 disabled:opacity-30">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="btnNext" onclick="changePage(1)" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-blue-600 disabled:opacity-30">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto min-h-[400px]">
                <table class="data-table w-full text-sm text-left">
                    <thead>
                        <tr>
                            <th>Phụ tùng</th>
                            <th>Loại hàng</th>
                            <th>Thông tin xe</th>
                            <th>Garage báo giá</th>
                            <th class="text-right">Đơn giá</th>
                            <th class="text-center">#</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="6" class="px-6 py-40 text-center text-slate-300 font-bold uppercase italic text-xs tracking-[0.2em]">Sẵn sàng tra cứu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; let NAM_ALL = []; 
        let MASTER_DATA = []; let CURRENT_PAGE = 1; let ITEMS_PER_PAGE = 10;

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => selectHang.add(new Option(hang, hang)));
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const container = document.getElementById('hieuXeCheckboxes');
            const btn = document.getElementById('multiHieuBtn');
            container.innerHTML = '';
            btn.innerHTML = '<span class="truncate">Tất cả dòng xe</span><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>';
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-3 p-2 rounded-lg hover:bg-slate-50 cursor-pointer transition-all';
                    label.innerHTML = `<input type="checkbox" name="hieu_xe" value="${hieu}" onchange="onHieuXeChange()" class="w-4 h-4 text-blue-600 rounded border-slate-300"> <span class="text-sm font-semibold text-slate-700">${hieu}</span>`;
                    container.appendChild(label);
                });
            } else { container.innerHTML = '<p class="text-[11px] text-slate-400 italic p-3">Chọn hãng xe trước</p>'; }
            fillNamSXDropdown(NAM_ALL);
        }

        window.onHieuXeChange = function() {
            const selected = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const btn = document.getElementById('multiHieuBtn');
            btn.innerHTML = `<span class="truncate">${selected.length > 0 ? selected.length + ' dòng xe đã chọn' : 'Tất cả dòng xe'}</span><svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"/></svg>`;
            updateNamSXDropdown();
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selected = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            let combinedNams = new Set();
            if (hang && selected.length > 0) {
                selected.forEach(h => { if (CAY_GIA_PHA[hang][h]) CAY_GIA_PHA[hang][h].forEach(n => combinedNams.add(n)); });
                fillNamSXDropdown(Array.from(combinedNams));
            } else { fillNamSXDropdown(NAM_ALL); }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">Tất cả</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const hieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const nam = document.getElementById('filterNam').value;
            const type = document.getElementById('filterType').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const tableBody = document.getElementById('resultsTableBody');
            const loading = document.getElementById('loadingIndicator');
            const errorBanner = document.getElementById('indexErrorBanner');

            errorBanner.style.display = 'none';
            tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center"><div class="animate-pulse flex flex-col items-center gap-3"><div class="h-2 w-40 bg-slate-200 rounded"></div><div class="h-2 w-32 bg-slate-100 rounded"></div></div></td></tr>';
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (hieus.length > 0) constraints.push(where("hieu_xe", "in", hieus.slice(0, 30)));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            
            // Xử lý Loại hàng trực tiếp trong Query để đồng bộ
            if (type === 'genuine') constraints.push(where("chinh_hang", "==", "Chính hãng"));
            // Lưu ý: Firestore không hỗ trợ "!=" cùng với các điều kiện in/range phức tạp mà không có index đặc biệt.
            // Để an toàn và đồng bộ nhất, ta sẽ chỉ lọc server-side cho "Chính hãng". 
            // "Thay thế" và "Tất cả" sẽ được xử lý linh hoạt hơn.

            constraints.push(limit(500)); 

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                MASTER_DATA = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    const chinhHangValue = (item.chinh_hang || '').toLowerCase();
                    // Lọc lại client-side cho trường hợp "Thay thế" (vì server-side != phức tạp hơn)
                    if (type === 'aftermarket' && chinhHangValue.includes("chính hãng")) return;
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) {
                        MASTER_DATA.push(item);
                    }
                });
                document.getElementById('statCount').innerText = MASTER_DATA.length + " kết quả";
                CURRENT_PAGE = 1;
                renderTable();
            } catch (e) {
                loading.classList.add('hidden');
                console.error(e);
                if (e.message.includes("index")) {
                    errorBanner.style.display = 'block';
                    document.getElementById('indexErrorMessage').innerHTML = `Lỗi Index Firestore: <a href="${e.message.match(/https:\/\/console\.firebase\.google\.com[^\s]*/)[0]}" target="_blank">Nhấn để tạo Index</a>`;
                } else {
                    alert("Lỗi kết nối: " + e.message);
                }
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-bold">TRUY VẤN THẤT BẠI</td></tr>';
            }
        }

        function renderTable() {
            const tableBody = document.getElementById('resultsTableBody');
            const totalPages = Math.ceil(MASTER_DATA.length / ITEMS_PER_PAGE);
            if (MASTER_DATA.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-32 text-center text-slate-300 font-bold uppercase italic text-xs">Không tìm thấy dữ liệu</td></tr>';
                updatePaginationUI(0); return;
            }
            const startIndex = (CURRENT_PAGE - 1) * ITEMS_PER_PAGE;
            const pageData = MASTER_DATA.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            tableBody.innerHTML = '';
            pageData.forEach(item => {
                const isGenuine = (item.chinh_hang || '').toLowerCase().includes("chính hãng");
                const badge = isGenuine ? '<span class="badge-pro badge-genuine">Chính hãng</span>' : '<span class="badge-pro badge-aftermarket">Thay thế</span>';
                tableBody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-all">
                        <td class="px-6 py-4">
                            <div class="text-[13px] font-black text-slate-900 uppercase">${item.ten_phu_tung}</div>
                            <div class="text-[9px] text-slate-400 font-bold mt-1 uppercase">${item.so_hsbt || 'N/A'}</div>
                        </td>
                        <td class="px-6 py-4">${badge}</td>
                        <td class="px-6 py-4">
                            <div class="text-[11px] font-black text-slate-700">${item.hang_xe} ${item.hieu_xe}</div>
                            <div class="text-[9px] text-slate-400 font-bold uppercase">Năm: ${item.nam_sx || '0'}</div>
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-[11px] font-bold text-slate-700 truncate max-w-[180px]">${item.ten_garage || 'KHÁC'}</div>
                            <div class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">${item.tinh_thanh || 'Toàn quốc'}</div>
                        </td>
                        <td class="px-6 py-4 text-right"><div class="price-text">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} <span class="text-[10px] opacity-40">đ</span></div></td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="copyPrice('${item.gia_duyet}')" class="p-2 text-slate-300 hover:text-blue-600 transition-all"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
                        </td>
                    </tr>
                `;
            });
            updatePaginationUI(totalPages);
        }

        function updatePaginationUI(totalPages) {
            document.getElementById('pageInfo').innerText = `Trang ${MASTER_DATA.length > 0 ? CURRENT_PAGE : 0} / ${totalPages}`;
            document.getElementById('btnPrev').disabled = CURRENT_PAGE <= 1;
            document.getElementById('btnNext').disabled = CURRENT_PAGE >= totalPages;
        }

        window.changePage = (offset) => { CURRENT_PAGE += offset; renderTable(); }
        window.changePageSize = () => { ITEMS_PER_PAGE = parseInt(document.getElementById('pageSize').value); CURRENT_PAGE = 1; renderTable(); }
        window.copyPrice = (p) => { navigator.clipboard.writeText(p).then(() => alert("Đã copy giá!")); }
        window.exportToCSV = () => {
            if (MASTER_DATA.length === 0) return alert("Không có dữ liệu!");
            let csv = "\uFEFFTên phụ tùng,Hãng xe,Hiieu xe,Năm SX,Loại hàng,Garage,Giá\n";
            MASTER_DATA.forEach(i => csv += `"${i.ten_phu_tung}","${i.hang_xe}","${i.hieu_xe}","${i.nam_sx}","${i.chinh_hang}","${i.ten_garage}","${i.gia_duyet}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "bao_gia.csv";
            link.click();
        }

        loadFilters();
    </script>
</body>
</html>
