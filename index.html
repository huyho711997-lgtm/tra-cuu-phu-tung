<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Tra Cứu Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .filter-select { background-color: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px; font-size: 14px; width: 100%; outline: none; }
        .filter-select:focus { border-color: #3b82f6; }
        .flat-card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; transition: transform 0.2s, box-shadow 0.2s; }
        .flat-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-2xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-extrabold text-blue-700">TASCO ĐẮK LẮK</h1>
                <p class="text-xs text-slate-500 font-medium uppercase tracking-widest">Hệ thống giám định 2026</p>
            </div>
            <div class="bg-blue-100 p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>

        <div class="flat-card p-5 shadow-sm mb-6">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Hãng xe</label>
                    <select id="filterHang" class="filter-select">
                        <option value="">-- Tất cả --</option>
                        </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Năm SX</label>
                    <select id="filterNam" class="filter-select">
                        <option value="">-- Tất cả --</option>
                        </select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Tên phụ tùng</label>
                    <input type="text" id="searchInput" placeholder="Ví dụ: đèn pha, vè trước..." 
                           class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:border-blue-500">
                </div>
            </div>
            <button onclick="searchData()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                TRA CỨU DỮ LIỆU
            </button>
        </div>

        <div id="statusArea" class="text-xs font-bold text-slate-400 mb-3 px-1 uppercase"></div>
        <div id="resultsList" class="space-y-4 pb-10">
            <div class="text-center py-10 text-slate-400">
                <p>Nhập thông tin để bắt đầu tra cứu</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Cấu hình Firebase đã được cập nhật chuẩn
        const firebaseConfig = {
            apiKey: "AIzaSyCIPwR1YTyot_BU-6B5YcaO0MLcd3pl-Eo",
            authDomain: "he-thong-tra-cuu-phu-tung.firebaseapp.com",
            projectId: "he-thong-tra-cuu-phu-tung",
            storageBucket: "he-thong-tra-cuu-phu-tung.firebasestorage.app",
            messagingSenderId: "1081518139126",
            appId: "1:1081518139126:web:ee81d2477638826b94eed7",
            measurementId: "G-1BFCZ0V268"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // 1. HÀM TỰ ĐỘNG ĐỔ DỮ LIỆU VÀO DROPDOWN
        // ==========================================
        async function loadFilters() {
            try {
                // Đọc file metadata từ Firebase
                const docRef = doc(db, "metadata", "filters");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Điền Hãng xe
                    const selectHang = document.getElementById('filterHang');
                    if(data.hang_xe) {
                        data.hang_xe.forEach(hang => {
                            selectHang.add(new Option(hang, hang));
                        });
                    }

                    // Điền Năm sản xuất
                    const selectNam = document.getElementById('filterNam');
                    if(data.nam_sx) {
                        data.nam_sx.forEach(nam => {
                            selectNam.add(new Option(nam, nam));
                        });
                    }
                } else {
                    console.log("Chưa có dữ liệu filter. Cần chạy file Python để tạo metadata trước.");
                }
            } catch (error) {
                console.error("Lỗi khi tải bộ lọc: ", error);
            }
        }

        // Tự động chạy hàm loadFilters khi trang web vừa mở
        loadFilters();

        // ==========================================
        // 2. HÀM TÌM KIẾM THEO BỘ LỌC
        // ==========================================
        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            const resultsList = document.getElementById('resultsList');
            const statusArea = document.getElementById('statusArea');

            resultsList.innerHTML = '<div class="text-center py-12 text-slate-400 italic">Đang lọc dữ liệu...</div>';
            statusArea.innerText = "";
            
            try {
                let q = collection(db, "LichSuBaoGia");
                let constraints = [];

                // Xây dựng câu truy vấn dựa trên những ô người dùng chọn
                if (hang) constraints.push(where("hang_xe", "==", hang));
                if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
                if (search) constraints.push(where("ten_phu_tung", "==", search));

                // Giới hạn 50 kết quả để tránh đứng máy
                constraints.push(limit(50));

                const finalQuery = query(q, ...constraints);
                const querySnapshot = await getDocs(finalQuery);
                
                resultsList.innerHTML = '';
                
                if (querySnapshot.empty) {
                    resultsList.innerHTML = '<div class="bg-white p-8 rounded-2xl text-center text-slate-400 border border-dashed border-slate-300">Không tìm thấy dữ liệu phù hợp với bộ lọc này.</div>';
                    statusArea.innerText = "0 kết quả";
                    return;
                }

                statusArea.innerText = `Tìm thấy ${querySnapshot.size} báo giá phù hợp`;

                // Đổ dữ liệu ra thẻ (Card)
                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const card = `
                        <div class="flat-card p-4 shadow-sm border-l-4 border-l-blue-500 mb-3 bg-white">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-2 py-0.5 rounded uppercase">${item.so_hsbt}</span>
                                <span class="font-bold text-green-600">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet)} đ</span>
                            </div>
                            <h3 class="font-bold text-slate-800 uppercase text-sm mb-3">${item.ten_phu_tung}</h3>
                            <div class="grid grid-cols-2 gap-2 text-[11px]">
                                <div>
                                    <span class="text-slate-400 block uppercase">Xe & Đời</span>
                                    <span class="font-semibold text-slate-600">${item.hang_xe} ${item.hieu_xe} (${item.nam_sx})</span>
                                </div>
                                <div>
                                    <span class="text-slate-400 block uppercase">Khu vực</span>
                                    <span class="font-semibold text-slate-600">${item.tinh_thanh}</span>
                                </div>
                                <div class="col-span-2 mt-1 pt-2 border-t border-slate-50 italic text-slate-400">
                                    ${item.ten_garage}
                                </div>
                            </div>
                        </div>
                    `;
                    resultsList.innerHTML += card;
                });

            } catch (error) {
                console.error(error);
                resultsList.innerHTML = '<div class="text-red-500 p-4 bg-red-50 rounded-xl text-center text-sm border border-red-200">Hệ thống yêu cầu tạo Index cho cấu hình tìm kiếm này. Vui lòng mở F12 (Console) trên máy tính, nhấn vào đường link báo lỗi màu đỏ để Firebase tự động thiết lập Index.</div>';
            }
        }
    </script>
</body>
</html>
