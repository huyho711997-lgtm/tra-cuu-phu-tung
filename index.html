<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASCO DLK - Hệ Thống Tra Cứu Phụ Tùng Doanh Nghiệp</title>
    <!-- CSS & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; color: #111827; }
        .main-container { max-width: 1540px; margin: 0 auto; }
        .pro-card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        .data-table thead th { background-color: #f9fafb; color: #4b5563; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; padding: 14px 24px; border-bottom: 2px solid #f3f4f6; }
        .data-table tbody tr { transition: background-color 0.2s; border-bottom: 1px solid #f3f4f6; }
        .data-table tbody tr:hover { background-color: #f9fafb; }
        .data-table td { padding: 12px 24px; vertical-align: middle; }
        .badge-pro { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
        .badge-genuine { background-color: #def7ec; color: #03543f; }
        .badge-aftermarket { background-color: #fef3c7; color: #92400e; }
        .price-text { font-weight: 800; font-size: 16px; color: #059669; }
        
        /* Unified Input Style */
        .input-group-label { display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 10px; font-weight: 800; color: #6b7280; letter-spacing: 0.05em; }
        .control-unified { 
            background-color: #ffffff !important; 
            border: 1px solid #d1d5db !important; 
            border-radius: 10px !important; 
            font-weight: 600 !important; 
            font-size: 13px !important; 
            height: 44px; 
            display: flex; 
            align-items: center; 
            padding-left: 40px;
            width: 100%;
            transition: all 0.2s;
        }
        .control-unified:focus { border-color: #2563eb !important; ring: 4px rgba(37, 99, 235, 0.1); }
        .icon-container { position: absolute; left: 14px; top: 12px; color: #9ca3af; pointer-events: none; }
        
        /* Multi-select Dropdown Custom */
        .multi-select-btn { 
            position: relative; 
            text-align: left; 
            justify-content: flex-start; 
            background: white; 
            border: 1px solid #d1d5db; 
            border-radius: 10px; 
            height: 44px; 
            padding-left: 40px; 
            font-size: 13px; 
            font-weight: 600; 
            width: 100%; 
            display: flex; 
            align-items: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        #dropdownMultiHieu { width: 300px; max-height: 300px; overflow-y: auto; padding: 8px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; color: #374151; transition: background 0.2s; }
        .checkbox-item:hover { background-color: #f3f4f6; }
        
        .stat-card { padding: 16px 20px; border-radius: 14px; background: white; border: 1px solid #e5e7eb; }
    </style>
</head>
<body class="antialiased">

    <!-- Top Navigation -->
    <nav class="bg-white border-b border-gray-200 px-8 py-3.5 sticky top-0 z-[100]">
        <div class="main-container flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-100">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <div>
                    <h1 class="text-xl font-black text-gray-900 tracking-tighter leading-none">TASCO <span class="text-blue-700">DLK</span></h1>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-1.5 leading-none">Professional Parts Lookup</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="exportToCSV()" class="text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 font-bold rounded-xl text-xs px-5 py-2.5 flex items-center gap-2 shadow-sm transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Xuất Excel
                </button>
            </div>
        </div>
    </nav>

    <main class="main-container px-8 py-8">
        
        <!-- Unified Search Panel -->
        <div class="pro-card p-8 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                <!-- Hãng xe -->
                <div class="md:col-span-2 relative">
                    <label class="input-group-label">1. Hãng sản xuất</label>
                    <div class="icon-container"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg></div>
                    <select id="filterHang" onchange="updateHieuXeDropdown()" class="control-unified pr-8 appearance-none cursor-pointer">
                        <option value="">Chọn hãng xe</option>
                    </select>
                </div>

                <!-- Hiệu xe Multi-select -->
                <div class="md:col-span-3 relative">
                    <label class="input-group-label">2. Dòng xe (Chọn nhiều)</label>
                    <div class="icon-container"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></div>
                    <button id="multiHieuBtn" data-dropdown-toggle="dropdownMultiHieu" class="multi-select-btn text-gray-400">
                        Chọn hiệu xe...
                    </button>
                    <!-- Dropdown menu -->
                    <div id="dropdownMultiHieu" class="z-50 hidden bg-white divide-y divide-gray-100 rounded-xl shadow-2xl border border-gray-100">
                        <div id="hieuXeCheckboxes" class="p-2 space-y-1">
                            <p class="text-[11px] text-gray-400 italic p-3">Vui lòng chọn hãng xe trước</p>
                        </div>
                    </div>
                </div>

                <!-- Năm SX -->
                <div class="md:col-span-2 relative">
                    <label class="input-group-label">3. Năm sản xuất</label>
                    <div class="icon-container"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>
                    <select id="filterNam" class="control-unified pr-8 appearance-none cursor-pointer">
                        <option value="">Tất cả các năm</option>
                    </select>
                </div>

                <!-- Từ khóa -->
                <div class="md:col-span-3 relative">
                    <label class="input-group-label">4. Tên linh kiện phụ tùng</label>
                    <div class="icon-container"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div>
                    <input type="text" id="searchInput" placeholder="Tìm tên linh kiện..." class="control-unified" onkeydown="if(event.key==='Enter') searchData()">
                </div>

                <!-- Button -->
                <div class="md:col-span-2">
                    <button onclick="searchData()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-black text-sm uppercase h-[44px] rounded-xl shadow-lg shadow-blue-700/20 transition-all flex items-center justify-center gap-2">
                        Truy vấn
                    </button>
                </div>
            </div>
        </div>

        <!-- Dashboard Stats & Local Filters -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="stat-card flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Tổng kết quả</p>
                    <p id="statCount" class="text-2xl font-black text-gray-900 mt-1">0</p>
                </div>
                <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"></path></svg></div>
            </div>
            <div class="stat-card flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Loại hàng</p>
                    <select id="filterType" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-gray-900 cursor-pointer mt-1">
                        <option value="all">Tất cả</option>
                        <option value="genuine">Chính hãng</option>
                        <option value="aftermarket">Thay thế</option>
                    </select>
                </div>
                <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center text-emerald-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"></path></svg></div>
            </div>
            <div class="stat-card flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Thứ tự hiển thị</p>
                    <select id="sortPrice" onchange="applyLocalFilters()" class="text-sm font-black border-none p-0 bg-transparent focus:ring-0 text-gray-900 cursor-pointer mt-1">
                        <option value="none">Mặc định</option>
                        <option value="asc">Giá thấp đến cao</option>
                        <option value="desc">Giá cao đến thấp</option>
                    </select>
                </div>
                <div class="w-12 h-12 bg-amber-50 rounded-xl flex items-center justify-center text-amber-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg></div>
            </div>
        </div>

        <!-- Professional Data Table -->
        <div class="pro-card overflow-hidden">
            <div class="px-8 py-5 border-b border-gray-100 bg-gray-50/50 flex flex-wrap items-center justify-between gap-6">
                <div class="flex items-center gap-6">
                    <div class="flex items-center gap-3">
                        <label class="text-[11px] font-black text-gray-400 uppercase tracking-widest">Hiển thị:</label>
                        <select id="pageSize" onchange="changePageSize()" class="bg-white border border-gray-300 text-gray-900 text-[11px] font-black rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-1.5 px-4 shadow-sm">
                            <option value="10">10 dòng</option>
                            <option value="25">25 dòng</option>
                            <option value="50">50 dòng</option>
                            <option value="100">100 dòng</option>
                        </select>
                    </div>
                    <div id="loadingIndicator" class="hidden">
                        <div class="animate-spin rounded-full h-4 w-4 border-2 border-blue-600 border-t-transparent"></div>
                    </div>
                    <div id="statusArea" class="text-[11px] font-black text-gray-500 uppercase tracking-widest italic">Hệ thống sẵn sàng</div>
                </div>
                
                <div class="flex items-center gap-4">
                    <span class="text-[11px] font-black text-gray-400 uppercase tracking-widest" id="pageInfo">Trang 0 / 0</span>
                    <div class="flex gap-1.5">
                        <button id="btnPrev" onclick="changePage(-1)" class="p-2.5 bg-white border border-gray-300 rounded-xl text-gray-500 hover:bg-gray-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <button id="btnNext" onclick="changePage(1)" class="p-2.5 bg-white border border-gray-300 rounded-xl text-gray-500 hover:bg-gray-100 hover:text-blue-600 disabled:opacity-30 disabled:cursor-not-allowed transition-all shadow-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="overflow-x-auto min-h-[500px]">
                <table class="data-table w-full text-sm text-left">
                    <thead>
                        <tr>
                            <th scope="col">Thông tin phụ tùng</th>
                            <th scope="col">Loại hàng</th>
                            <th scope="col">Chi tiết xe</th>
                            <th scope="col">Garage / Đơn vị báo giá</th>
                            <th scope="col" class="text-right">Đơn giá đã duyệt</th>
                            <th scope="col" class="text-center">Tác vụ</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTableBody">
                        <tr><td colspan="6" class="px-6 py-40 text-center text-gray-400 font-black uppercase tracking-[0.2em] opacity-30 italic text-xs">Vui lòng thiết lập bộ lọc để tra cứu dữ liệu</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT8G6mI1w5woinOU5QgfHGhUhcVzuy5Oo",
            authDomain: "tra-cuu-phu-tung-e70b3.firebaseapp.com",
            projectId: "tra-cuu-phu-tung-e70b3",
            storageBucket: "tra-cuu-phu-tung-e70b3.firebasestorage.app",
            messagingSenderId: "948573734280",
            appId: "1:948573734280:web:5708bba29b6b6dce6f263d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let CAY_GIA_PHA = {}; 
        let NAM_ALL = []; 
        let MASTER_DATA = []; 
        let FILTERED_DATA = []; 
        let CURRENT_PAGE = 1;
        let ITEMS_PER_PAGE = 10;

        async function loadFilters() {
            try {
                const docSnap = await getDoc(doc(db, "metadata", "filters"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    CAY_GIA_PHA = data.cay_gia_pha_xe || {};
                    NAM_ALL = data.nam_sx_all || [];
                    const selectHang = document.getElementById('filterHang');
                    Object.keys(CAY_GIA_PHA).sort().forEach(hang => selectHang.add(new Option(hang, hang)));
                    fillNamSXDropdown(NAM_ALL);
                }
            } catch (e) { console.error(e); }
        }

        window.updateHieuXeDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const container = document.getElementById('hieuXeCheckboxes');
            const btn = document.getElementById('multiHieuBtn');
            container.innerHTML = '';
            btn.innerText = "Chọn hiệu xe...";
            btn.classList.add('text-gray-400');
            
            if (hang && CAY_GIA_PHA[hang]) {
                Object.keys(CAY_GIA_PHA[hang]).sort().forEach(hieu => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-item';
                    label.innerHTML = `<input type="checkbox" name="hieu_xe" value="${hieu}" onchange="onHieuXeChange()" class="w-4 h-4 text-blue-600 rounded-md border-gray-300 focus:ring-blue-500"> <span>${hieu}</span>`;
                    container.appendChild(label);
                });
            } else {
                container.innerHTML = '<p class="text-[11px] text-gray-400 italic p-3">Vui lòng chọn hãng xe trước</p>';
            }
            fillNamSXDropdown(NAM_ALL);
        }

        window.onHieuXeChange = function() {
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const btn = document.getElementById('multiHieuBtn');
            if (selectedHieus.length > 0) {
                btn.innerText = `${selectedHieus.length} hiệu xe đã chọn`;
                btn.classList.remove('text-gray-400');
                btn.classList.add('text-gray-900');
            } else {
                btn.innerText = "Chọn hiệu xe...";
                btn.classList.add('text-gray-400');
                btn.classList.remove('text-gray-900');
            }
            updateNamSXDropdown();
        }

        window.updateNamSXDropdown = function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            let combinedNams = new Set();
            if (hang && selectedHieus.length > 0) {
                selectedHieus.forEach(h => { if (CAY_GIA_PHA[hang][h]) CAY_GIA_PHA[hang][h].forEach(n => combinedNams.add(n)); });
                fillNamSXDropdown(Array.from(combinedNams));
            } else {
                fillNamSXDropdown(NAM_ALL);
            }
        }

        function fillNamSXDropdown(list) {
            const selectNam = document.getElementById('filterNam');
            selectNam.innerHTML = '<option value="">Tất cả các năm</option>';
            list.sort((a,b) => b-a).forEach(n => selectNam.add(new Option(n, n)));
        }

        window.searchData = async function() {
            const hang = document.getElementById('filterHang').value;
            const selectedHieus = Array.from(document.querySelectorAll('input[name="hieu_xe"]:checked')).map(cb => cb.value);
            const nam = document.getElementById('filterNam').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const tableBody = document.getElementById('resultsTableBody');
            const statusArea = document.getElementById('statusArea');
            const loading = document.getElementById('loadingIndicator');

            tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center"><div class="flex justify-center items-center gap-2"><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce"></div><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce [animation-delay:0.4s]"></div></div></td></tr>';
            statusArea.innerText = "Đang truy vấn...";
            loading.classList.remove('hidden');

            let q = collection(db, "LichSuBaoGia");
            let constraints = [];
            if (hang) constraints.push(where("hang_xe", "==", hang));
            if (selectedHieus.length > 0) constraints.push(where("hieu_xe", "in", selectedHieus.slice(0, 30)));
            if (nam) constraints.push(where("nam_sx", "==", parseInt(nam)));
            constraints.push(limit(500)); 

            try {
                const snap = await getDocs(query(q, ...constraints));
                loading.classList.add('hidden');
                MASTER_DATA = [];
                snap.forEach(doc => {
                    const item = doc.data();
                    if (!search || (item.ten_phu_tung && item.ten_phu_tung.toLowerCase().includes(search))) MASTER_DATA.push(item);
                });
                applyLocalFilters();
            } catch (e) {
                console.error(e);
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-20 text-center text-red-500 font-bold uppercase text-xs">Lỗi kết nối máy chủ.</td></tr>';
            }
        }

        window.applyLocalFilters = function() {
            const typeFilter = document.getElementById('filterType').value;
            const sortOrder = document.getElementById('sortPrice').value;
            FILTERED_DATA = MASTER_DATA.filter(item => {
                if (typeFilter === 'all') return true;
                if (typeFilter === 'genuine') return item.chinh_hang === "Chính hãng";
                if (typeFilter === 'aftermarket') return item.chinh_hang !== "Chính hãng";
                return true;
            });
            if (sortOrder === 'asc') FILTERED_DATA.sort((a,b) => (a.gia_duyet || 0) - (b.gia_duyet || 0));
            else if (sortOrder === 'desc') FILTERED_DATA.sort((a,b) => (b.gia_duyet || 0) - (a.gia_duyet || 0));
            document.getElementById('statCount').innerText = FILTERED_DATA.length;
            CURRENT_PAGE = 1;
            renderTable();
        }

        function renderTable() {
            const tableBody = document.getElementById('resultsTableBody');
            const totalPages = Math.ceil(FILTERED_DATA.length / ITEMS_PER_PAGE);
            if (FILTERED_DATA.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-32 text-center font-black text-gray-300 uppercase tracking-widest text-xs">Không tìm thấy dữ liệu phù hợp</td></tr>';
                updatePaginationUI(0);
                return;
            }
            const startIndex = (CURRENT_PAGE - 1) * ITEMS_PER_PAGE;
            const pageData = FILTERED_DATA.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            tableBody.innerHTML = '';
            pageData.forEach(item => {
                const isGenuine = item.chinh_hang === "Chính hãng";
                const badgeHtml = isGenuine ? 
                    `<span class="badge-pro badge-genuine"><svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.9L10 1.55l7.834 3.35a1 1 0 01.666.927V15c0 4.075-3.35 7.45-7.834 8.7a1 1 0 01-.666 0C5.516 22.45 2.166 19.075 2.166 15V5.827a1 1 0 01.666-.927zM10 15a1 1 0 100-2 1 1 0 000 2zm1-4a1 1 0 11-2 0V7a1 1 0 112 0v4z" clip-rule="evenodd"></path></svg>Chính hãng</span>` : 
                    `<span class="badge-pro badge-aftermarket"><svg class="w-3 h-3 mr-1.5" fill="currentColor" viewBox="0 0 20 20"><path d="M11 17a1 1 0 001.447.894l4-2A1 1 0 0017 15V9.236a1 1 0 00-1.447-.894l-4 2A1 1 0 004 4.236v5c0 .342.176.66.467.847L4.553 7.106z"></path></svg>Ngoài/Thay thế</span>`;
                const rowHtml = `
                    <tr class="hover:bg-gray-50 transition-colors border-b border-gray-100">
                        <td class="px-6 py-5">
                            <div class="text-[13px] font-black text-gray-900 uppercase leading-tight">${item.ten_phu_tung}</div>
                            <div class="text-[10px] text-gray-400 font-bold mt-1.5 tracking-widest uppercase">${item.so_hsbt || 'N/A'}</div>
                        </td>
                        <td class="px-6 py-5">${badgeHtml}</td>
                        <td class="px-6 py-5">
                            <div class="text-[12px] font-black text-gray-700">${item.hang_xe} ${item.hieu_xe}</div>
                            <div class="text-[10px] text-gray-400 font-black mt-1 uppercase">Sản xuất: ${item.nam_sx || '0'}</div>
                        </td>
                        <td class="px-6 py-5">
                            <div class="text-[12px] font-black text-gray-700 truncate max-w-[220px]" title="${item.ten_garage}">${item.ten_garage || 'KHÁC'}</div>
                            <div class="text-[10px] text-gray-400 font-black mt-1 uppercase tracking-wider">${item.tinh_thanh || 'Toàn quốc'}</div>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <div class="price-text">${new Intl.NumberFormat('vi-VN').format(item.gia_duyet || 0)} <span class="text-[10px] opacity-60">đ</span></div>
                        </td>
                        <td class="px-6 py-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="copyPrice('${item.gia_duyet}')" class="p-2.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all shadow-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
                                <button class="text-[10px] font-black text-gray-400 hover:text-gray-900 uppercase tracking-widest px-3 py-2 rounded-xl hover:bg-gray-100">Chi tiết</button>
                            </div>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += rowHtml;
            });
            updatePaginationUI(totalPages);
            document.getElementById('statusArea').innerText = `Kết quả ${startIndex + 1} - ${Math.min(startIndex + ITEMS_PER_PAGE, FILTERED_DATA.length)} / ${FILTERED_DATA.length}`;
        }

        function updatePaginationUI(totalPages) {
            document.getElementById('pageInfo').innerText = `Trang ${FILTERED_DATA.length > 0 ? CURRENT_PAGE : 0} / ${totalPages}`;
            document.getElementById('btnPrev').disabled = CURRENT_PAGE <= 1;
            document.getElementById('btnNext').disabled = CURRENT_PAGE >= totalPages;
        }

        window.changePage = function(offset) {
            CURRENT_PAGE += offset;
            renderTable();
        }

        window.changePageSize = function() {
            ITEMS_PER_PAGE = parseInt(document.getElementById('pageSize').value);
            CURRENT_PAGE = 1;
            renderTable();
        }

        window.copyPrice = function(price) {
            navigator.clipboard.writeText(price).then(() => {
                alert("Đã sao chép giá: " + price + " đ");
            });
        }

        window.exportToCSV = function() {
            if (FILTERED_DATA.length === 0) return alert("Không có dữ liệu để xuất!");
            let csv = "\uFEFF"; 
            csv += "Tên phụ tùng,Hãng xe,Hiệu xe,Năm SX,Loại hàng,Garage,Đơn giá duyệt\n";
            FILTERED_DATA.forEach(i => {
                csv += `"${i.ten_phu_tung}","${i.hang_xe}","${i.hieu_xe}","${i.nam_sx}","${i.chinh_hang}","${i.ten_garage}","${i.gia_duyet}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "bao_gia_phu_tung.csv");
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        loadFilters();
    </script>
</body>
</html>
